{% extends "base.html" %}

{% block content %}
<section class="panel">
  <h1>Sign in</h1>
  <p class="muted" data-auth-target="status">Server-rendered UI with progressive enhancement.</p>

  <form class="stack" data-controller="auth" method="post" action="#">
    <label class="field">
      <span>Email</span>
      <input type="email" name="email" placeholder="you@novadrive.io" required />
    </label>

    <label class="field">
      <span>Password</span>
      <input type="password" name="password" placeholder="Your password" required />
    </label>

    <button class="btn" type="submit" disabled>Sign in (wiring pending)</button>
  </form>
</section>

<section class="panel subtle">
  <div
    id="health-status"
    class="notice"
    hx-get="/api/v1/health"
    hx-trigger="load"
    hx-swap="innerHTML"
  >
    Loading API health...
  </div>
</section>
{% endblock %}
