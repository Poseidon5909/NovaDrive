version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: dsp_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
    networks:
      - dsp_network

  postgres:
    image: postgres:16
    container_name: dsp_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dsp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dsp_network

volumes:
  postgres_data:

networks:
  dsp_network: